version: '3.8'

services:
  processor:
    build:
      context: ./processor
    container_name: noaa_processor
    volumes:
      - ${HOST_WAV_INPUT_DIR:-./input-wav}:/input:rw
      - ${HOST_PNG_OUTPUT_DIR:-./png-images}:/output:rw
      - ${HOST_RAW_IMAGES_DIR:-./raw_images}:/raw_images:rw
      - ${HOST_CONFIG_DIR:-./configs}/token:/etc/immich/token:ro
    environment:
      - WAV_INPUT_DIR=/input
      - PNG_OUTPUT_DIR=/output
      - MAX_AGE_DAYS=${PROCESSOR_MAX_AGE_DAYS:-7}
      - CLEANUP_INTERVAL_MIN=${PROCESSOR_CLEANUP_INTERVAL_MIN:-60}
    restart: unless-stopped

  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich_server
    ports:
      - "${IMMICH_PORT:-2283}:2283"
    volumes:
      - ${HOST_PNG_OUTPUT_DIR:-./png-images}:/png-output:rw
      - immich-data:/usr/src/app/upload
    environment:
      - DB_HOSTNAME=postgres
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-immich_password}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME:-immich}
      - REDIS_HOSTNAME=redis
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  postgres:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich_postgres
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD:-immich_password}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_DB=${DB_DATABASE_NAME:-immich}
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: immich_redis
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ${HOST_PNG_OUTPUT_DIR:-./png-images}:/output:rw
      - ${HOST_RAW_IMAGES_DIR:-./raw_images}:/raw_images:rw
      - ${HOST_CONFIG_DIR:-./configs}:/configs:ro
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RESTRICT_FILE_ACCESS_TO=/raw_images;/output
    restart: unless-stopped

volumes:
  immich-data:
  postgres-data:
  n8n-data:
