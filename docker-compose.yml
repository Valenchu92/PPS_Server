version: '3.8'

services:
  n8n:
    build:
      context: ./n8n-custom
    container_name: n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ${HOST_PNG_OUTPUT_DIR:-./png-images}:/output:rw
      - ${HOST_RAW_IMAGES_DIR:-./raw_images}:/raw_images:rw
      - ${HOST_CONFIG_DIR:-./configs}:/configs:rw
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RESTRICT_FILE_ACCESS_TO=/raw_images;/output
      - RCLONE_CONFIG=/configs/rclone.conf
      - RCLONE_SYNC_ENABLED=${RCLONE_SYNC_ENABLED:-true}
    restart: unless-stopped

  influxdb:
    image: influxdb:2
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ${HOST_CONFIG_DIR:-./configs}/influxdb:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=${INFLUXDB_INIT_MODE:-setup}
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_INIT_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_INIT_PASSWORD:-adminpassword}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_INIT_ORG:-noaa_org}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_INIT_BUCKET:-telemetry}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_INIT_ADMIN_TOKEN:-my-super-secret-auth-token}
    restart: unless-stopped

  telegraf:
    image: telegraf:alpine
    container_name: telegraf
    volumes:
      - ${HOST_CONFIG_DIR:-./configs}/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    environment:
      - INFLUX_TOKEN=${INFLUXDB_INIT_ADMIN_TOKEN:-my-super-secret-auth-token}
      - INFLUX_ORG=${INFLUXDB_INIT_ORG:-noaa_org}
      - INFLUX_BUCKET=${INFLUXDB_INIT_BUCKET:-telemetry}
      - INFLUX_URL=http://influxdb:8086
    depends_on:
      - influxdb
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

  gallery:
    image: nginx:alpine
    container_name: gallery
    ports:
      - "${GALLERY_PORT:-8080}:80"
    volumes:
      - ${HOST_PNG_OUTPUT_DIR:-./png-images}:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  n8n-data:
  influxdb-data:
  grafana-data:
