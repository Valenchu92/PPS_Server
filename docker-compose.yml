
services:
  processor:
    build:
      context: ./processor
    container_name: processor
    volumes:
      - ${HOST_RAW_IMAGES_DIR:-./raw_images}:/raw_images:rw
      - ${HOST_RAW_DATA_DIR:-./raw_data}:/raw_data:rw
      - ${HOST_PNG_OUTPUT_DIR:-./png-images}:/png-images:rw
      - ${HOST_PNG_NOAA_DIR:-./png-NOAA}:/png-NOAA:rw
      - ${HOST_CONFIG_DIR:-./configs}:/configs:rw
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUXDB_INIT_ADMIN_TOKEN:-my-super-secret-auth-token}
      - INFLUX_ORG=${INFLUXDB_INIT_ORG:-noaa_org}
      - INFLUX_BUCKET_TELEMETRY=${INFLUXDB_BUCKET_TELEMETRY:-telemetry}
      - INFLUX_BUCKET_INDEXES=${INFLUXDB_BUCKET_INDEXES:-indexes}
      - INFLUX_BUCKET_PREDICTIONS=${INFLUXDB_BUCKET_PREDICTIONS:-predictions}
      - METEOROLOGY_ALTITUDE=${METEOROLOGY_ALTITUDE:-441}
      - RCLONE_GDRIVE_PATH=${RCLONE_GDRIVE_PATH:-images_pps}
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY:-}
      - OPENWEATHERMAP_CITY=${OPENWEATHERMAP_CITY:-Rio Cuarto,AR}
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      - influxdb
    restart: unless-stopped

  influxdb:
    image: influxdb:2
    container_name: influxdb
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      #- ${HOST_CONFIG_DIR:-./configs}/influxdb:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=${INFLUXDB_INIT_MODE:-setup}
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_INIT_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_INIT_PASSWORD:-adminpassword}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_INIT_ORG:-noaa_org}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_INIT_BUCKET:-telemetry}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_INIT_ADMIN_TOKEN:-my-super-secret-auth-token}
      - INFLUXD_UI_DISABLED=true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ${HOST_CONFIG_DIR:-./configs}/grafana/provisioning:/etc/grafana/provisioning:ro
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      - influxdb
    restart: unless-stopped

  gallery:
    build:
      context: ./gallery
    container_name: gallery
    ports:
      - "${GALLERY_PORT:-8080}:8080"
    volumes:
      - ./gallery-ui:/var/www/html:ro
      - ${HOST_PNG_OUTPUT_DIR:-./png-images}:/var/www/html/goes:ro
      - ${HOST_PNG_NOAA_DIR:-./png-NOAA}:/var/www/html/noaa:ro
      - ${HOST_CONFIG_DIR:-./configs}/gallery/default.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - CROWDSEC_BOUNCER_KEY=${CROWDSEC_BOUNCER_KEY:-generame_una_key_secreta_aqui_12345}
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    depends_on:
      - crowdsec
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=America/Argentina/Buenos_Aires
      # 6 campos (Segundos, Minutos, Horas, Día, Mes, DíaSemana) -> 3 AM diario
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_CLEANUP=true
      - DOCKER_API_VERSION=1.41
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - LOKI_RETENTION_DAYS=${LOKI_RETENTION_DAYS:-7}
    command: -config.file=/etc/loki/local-config.yaml -config.expand-env=true
    volumes:
      - ./loki-data:/tmp/loki
      - ${HOST_CONFIG_DIR:-./configs}/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${HOST_CONFIG_DIR:-./configs}/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    security_opt:
      - no-new-privileges:true
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    restart: unless-stopped

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    environment:
      - COLLECTIONS=crowdsecurity/nginx
    volumes:
      - crowdsec-db:/var/lib/crowdsec/data
      - ${HOST_CONFIG_DIR:-./configs}/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    restart: unless-stopped

volumes:
  influxdb-data:
  grafana-data:
  crowdsec-db:
