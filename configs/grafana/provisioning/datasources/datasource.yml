apiVersion: 1

datasources:
  - name: InfluxDB_Flux
    uid: InfluxDB_Flux
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: noaa_org
      defaultBucket: telemetry
      tlsSkipVerify: true
    secureJsonData:
      token: my-super-secret-auth-token
    editable: true
