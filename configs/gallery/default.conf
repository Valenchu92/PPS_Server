# Definición de zonas de limitación
limit_req_zone $binary_remote_addr zone=mylimit:10m rate=3r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen       8080;
    server_name  localhost;
    server_tokens off;

    # Aplicar limitaciones
    limit_req zone=mylimit burst=5 nodelay;
    limit_conn addr 10;

    location / {
        root   /var/www/html;
        index  index.html;
    }

    location /goes/ {
        alias /var/www/html/goes/;
        autoindex on;
        autoindex_format json;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    location /noaa/ {
        alias /var/www/html/noaa/;
        autoindex on;
        autoindex_format json;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Denegar acceso a archivos que empiezan con punto (ocultos)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
