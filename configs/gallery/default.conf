server {
    listen       80;
    server_name  localhost;

    location / {
        root   /var/www/html;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    location /goes/ {
        root /var/www/html;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    location /noaa/ {
        root /var/www/html;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
